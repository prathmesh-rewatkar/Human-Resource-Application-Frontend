<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Manager Subordinates</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f0ebe3;
            --nav-bg: #1a1a18;
            --gold: #c9a84c;
            --text-dark: #1a1a18;
            --text-mid: #555550;
            --text-light: #888880;
            --border: #d8d2c8;
            --row-hover: #e8e2d8;
            --white: #ffffff;
            --btn-dark: #1a1a18;
            --badge-bg: #c9a84c;
        }

        body {
            font-family: 'IBM Plex Sans', sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* ── NAV ── */
        nav {
            background: var(--nav-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2.5rem;
            height: 52px;
        }

        .nav-brand {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 1.1rem;
            letter-spacing: 0.02em;
            text-decoration: none;
        }

        .nav-back {
            color: #aaa;
            font-size: 0.8rem;
            letter-spacing: 0.06em;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .nav-back:hover { color: var(--white); }
        .nav-back::before { content: '←'; }

        /* ── PAGE ── */
        .page {
            max-width: 1380px;
            margin: 0 auto;
            padding: 2.8rem 2.5rem 4rem;
        }

        /* ── HEADER ── */
        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .page-title-block h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            line-height: 1;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--badge-bg);
            color: var(--nav-bg);
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            border-radius: 20px;
            padding: 3px 9px;
            min-width: 28px;
            vertical-align: middle;
        }

        .page-title-block p {
            color: var(--text-light);
            font-size: 0.82rem;
            margin-top: 6px;
            letter-spacing: 0.01em;
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
            border: 1.5px solid var(--border);
            background: var(--white);
        }

        .empty-state p {
            font-size: 0.9rem;
            margin-top: 8px;
        }

        /* ── TABLE ── */
        .table-wrap {
            border: 1.5px solid var(--border);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: var(--nav-bg);
        }

        thead th {
            color: #aaa9a0;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 14px 20px;
            text-align: left;
        }

        thead th:first-child { width: 52px; }
        thead th:last-child  { text-align: right; }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--row-hover); }

        tbody td {
            padding: 16px 20px;
            font-size: 0.86rem;
            color: var(--text-dark);
        }

        tbody td:first-child {
            color: var(--text-light);
            font-size: 0.82rem;
        }

        td.name-cell  { font-weight: 600; }
        td.dept-cell  { color: var(--gold); font-weight: 500; }
        td.job-cell   { color: var(--text-mid); font-size: 0.83rem; }

        /* ── ACTION CELL ── */
        .actions-cell {
            text-align: right;
            white-space: nowrap;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            font-size: 0.75rem;
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 500;
            border: 1.5px solid var(--border);
            background: transparent;
            cursor: pointer;
            color: var(--text-dark);
            letter-spacing: 0.02em;
            transition: background 0.15s, border-color 0.15s;
        }
        .action-btn:hover { border-color: var(--text-dark); background: #e0dbd2; }
        .action-btn .icon { font-size: 0.8rem; }

        /* ── MODAL OVERLAY ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(26, 26, 24, 0.55);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg);
            border: 1.5px solid var(--border);
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            position: relative;
        }

        .modal h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            margin-bottom: 6px;
        }

        .modal p {
            font-size: 0.82rem;
            color: var(--text-light);
            margin-bottom: 1.4rem;
        }

        .modal label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-mid);
            margin-bottom: 6px;
        }

        .modal input[type="number"] {
            width: 100%;
            height: 42px;
            padding: 0 14px;
            border: 1.5px solid var(--border);
            background: var(--white);
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.86rem;
            color: var(--text-dark);
            outline: none;
            margin-bottom: 1.4rem;
            transition: border-color 0.2s;
        }
        .modal input[type="number"]:focus { border-color: var(--text-dark); }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .btn {
            height: 40px;
            padding: 0 20px;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            border: 1.5px solid transparent;
            letter-spacing: 0.03em;
            transition: background 0.18s, border-color 0.18s;
        }

        .btn-confirm {
            background: var(--btn-dark);
            color: var(--white);
            border-color: var(--btn-dark);
        }
        .btn-confirm:hover { background: #333; border-color: #333; }

        .btn-cancel {
            background: transparent;
            color: var(--text-dark);
            border-color: var(--border);
        }
        .btn-cancel:hover { border-color: var(--text-dark); }

        .modal-close {
            position: absolute;
            top: 14px; right: 16px;
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--text-light);
            line-height: 1;
        }
        .modal-close:hover { color: var(--text-dark); }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 12px 20px;
            font-size: 0.83rem;
            font-weight: 500;
            border: 1.5px solid;
            z-index: 200;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.25s, transform 0.25s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #e8f4ec; border-color: #6abf82; color: #2a6b3c; }
        .toast.error   { background: #fdf0f0; border-color: #e08080; color: #8b2020; }
    </style>
</head>
<body>

<!-- NAV -->
<nav>
    <a class="nav-brand" href="#">HR Portal</a>
    <a class="nav-back" href="/managers">Back to Managers</a>
</nav>

<!-- PAGE -->
<div class="page">

    <!-- HEADER -->
    <div class="page-header">
        <div class="page-title-block">
            <h1>
                Subordinate Details
                <span class="badge"
                      th:text="${subordinates != null ? #lists.size(subordinates) : 0}">0</span>
            </h1>
            <p>View and manage all subordinates under this manager</p>
        </div>
    </div>

    <!-- EMPTY STATE -->
    <div class="empty-state"
         th:if="${subordinates == null or #lists.isEmpty(subordinates)}">
        <p>No subordinates found for this manager.</p>
    </div>

    <!-- TABLE -->
    <div class="table-wrap"
         th:if="${subordinates != null and not #lists.isEmpty(subordinates)}">
        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Job Title</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="sub,i : ${subordinates}">
                <td th:text="${i.index + 1}"></td>
                <td class="name-cell" th:text="${sub.firstName + ' ' + sub.lastName}"></td>
                <td th:text="${sub.email}"></td>
                <td class="dept-cell" th:text="${sub.department_DepartmentName}"></td>
                <td class="job-cell"  th:text="${sub.job_JobTitle}"></td>
                <td class="actions-cell">
                    <button class="action-btn"
                            th:attr="onclick=|openModal(${sub.employeeId}, '${sub.firstName} ${sub.lastName}')|">
                        <span class="icon">✎</span> Update Manager
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">

        <button class="modal-close" onclick="closeModal()">✕</button>

        <h3>Update Manager</h3>
        <p id="modalSubText">Enter the new Manager ID for this employee.</p>

        <!-- ✅ FORM INSIDE MODAL -->
        <form action="/managers/update" method="post">

            <input type="hidden" name="employeeId" id="employeeIdField">

            <label for="managerIdInput">New Manager ID</label>
            <input type="number" name="newManagerId" id="managerIdInput"
                   placeholder="e.g. 105" min="1" required />

            <div class="modal-actions">
                <button type="button" class="btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-confirm">Confirm</button>
            </div>

        </form>

    </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
<!--    let activeEmployeeId = null;-->

    function openModal(employeeId, name) {

    document.getElementById('employeeIdField').value = employeeId; // 🔥 ADD THIS

    document.getElementById('modalSubText').textContent =
        'Enter the new Manager ID for ' + name + '.';

    document.getElementById('managerIdInput').value = '';
    document.getElementById('modalOverlay').classList.add('active');

    setTimeout(() => document.getElementById('managerIdInput').focus(), 50);
}

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
        activeEmployeeId = null;
    }

    function showToast(message, type) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = 'toast ' + type + ' show';
        setTimeout(() => toast.classList.remove('show'), 3000);
    }


    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // Close on Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });
</script>

</body>
</html>
