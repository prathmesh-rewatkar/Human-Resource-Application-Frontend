<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Regions', ~{::body-content})}">
<body>
<th:block th:fragment="body-content">

    <!-- ── ALERTS ── -->
    <div th:if="${successMsg}" class="alert alert-success">✔ <span th:text="${successMsg}"></span></div>
    <div th:if="${errorMsg}"   class="alert alert-error">✖ <span th:text="${errorMsg}"></span></div>

    <!-- ── PAGE HEADER ── -->
    <div class="page-header">
        <div class="page-title-group">
            <span class="page-icon" style="font-size:20px">🗺</span>
            <div>
                <h1 class="page-title">Regions</h1>
                <p class="page-sub">Manage geographic regions and their country coverage</p>
            </div>
        </div>
        <button class="btn-primary" onclick="openModal('modal-add-region')">
            + Add Region
        </button>
    </div>

    <!-- ── SUMMARY ── -->
    <div class="summary-bar">
        <span class="summary-num" th:text="${regions.size()} + ' regions total'"></span>
    </div>

    <!-- ── SEARCH + TABLE ── -->
    <div class="card">
        <div class="table-toolbar">
            <div class="toolbar-left">
                <div class="search-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input"
                           data-table="reg-tbody"
                           placeholder="Search regions…"/>
                </div>
            </div>
        </div>

        <div class="table-wrap">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Region Name</th>
                    <th>Countries</th>
                    <th>Country Codes</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="reg-tbody">
                <tr class="empty-msg-row" style="display:none">
                    <td colspan="4" style="text-align:center;padding:44px 0;color:var(--ink3)">
                        No regions found
                    </td>
                </tr>
                <tr th:each="r : ${regions}" class="data-row">
                    <td class="cell-main" th:text="${r.regionName}"></td>
                    <td>
                        <span class="count-badge">
                            🌐 <span th:text="${countryCountMap[r.regionId] ?: 0}"></span>
                        </span>
                    </td>
                    <td>
                        <div class="chips">
                            <!-- Show first 6 chips -->
                            <span th:each="code, s : ${countryCodesMap[r.regionId]}"
                                  th:if="${s.index < 6}"
                                  class="chip"
                                  th:text="${code}"></span>

                            <!-- If more than 6, show clickable button that opens a modal with ALL codes -->
                            <button type="button"
                                    th:if="${countryCodesMap[r.regionId] != null and countryCodesMap[r.regionId].size() > 6}"
                                    class="chip chip-more"
                                    th:text="'+' + (${countryCodesMap[r.regionId].size()} - 6) + ' more'"
                                    th:onclick="|openModal('codes-modal-' + ${r.regionId})|">
                            </button>
                        </div>
                    </td>
                    <td>
                        <div class="row-actions">
                            <button class="action-btn edit" title="Edit"
                                    data-edit-btn="modal-edit-region"
                                    th:data-regionid="${r.regionId}"
                                    th:data-regionname="${r.regionName}">
                                ✎
                            </button>
                            <button class="action-btn delete" title="Delete"
                                    data-delete-btn="modal-delete-region"
                                    th:data-delete-action="@{/regions/{id}/delete(id=${r.regionId})}"
                                    th:data-delete-label="${r.regionName}"
                                    th:data-delete-count="${countryCountMap[r.regionId] ?: 0}">
                                🗑
                            </button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" data-pag="reg-tbody">
            <span class="pag-info"></span>
            <div class="pag-buttons"></div>
        </div>
    </div>


    <!-- ══════════════════════════════════════════
         MODALS: Full Country Codes (one per region, only rendered if >6 codes)
         These are purely server-rendered by Thymeleaf — no JS fetch needed.
    ══════════════════════════════════════════ -->
    <th:block th:each="r : ${regions}">
        <div th:if="${countryCodesMap[r.regionId] != null and countryCodesMap[r.regionId].size() > 6}"
             th:id="'codes-modal-' + ${r.regionId}"
             class="modal-overlay hidden">
            <div class="modal-box">
                <div class="modal-header">
                    <h4>
                        <span th:text="${r.regionName}"></span>
                        — All Country Codes
                        <span style="font-size:13px;font-weight:400;color:var(--ink3);margin-left:6px"
                              th:text="'(' + ${countryCodesMap[r.regionId].size()} + ' total)'"></span>
                    </h4>
                    <button class="modal-close"
                            th:onclick="|closeModal('codes-modal-' + ${r.regionId})|">✕</button>
                </div>
                <div class="modal-body">
                    <div class="chips" style="gap:6px">
                    <span th:each="code : ${countryCodesMap[r.regionId]}"
                          class="chip"
                          th:text="${code}"></span>
                    </div>
                </div>
            </div>
        </div>
    </th:block>


    <!-- ══ MODAL: Add Region ══ -->
    <div id="modal-add-region" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-header">
                <h4>Add New Region</h4>
                <button class="modal-close" onclick="closeModal('modal-add-region')">✕</button>
            </div>
            <div class="modal-body">
                <form th:action="@{/regions/add}" method="post">
                    <div class="form-group">
                        <label class="form-label">Region Name <span class="req">*</span></label>
                        <input name="regionName" class="form-control"
                               placeholder="e.g. South Asia" maxlength="25" required/>
                        <span class="form-hint">Max 25 characters</span>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-ghost" onclick="closeModal('modal-add-region')">Cancel</button>
                        <button type="submit" class="btn-primary">✔ Add Region</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <!-- ══ MODAL: Edit Region ══ -->
    <div id="modal-edit-region" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-header">
                <h4>Edit Region</h4>
                <button class="modal-close" onclick="closeModal('modal-edit-region')">✕</button>
            </div>
            <div class="modal-body">
                <form id="edit-region-form" method="post">
                    <div class="form-group">
                        <label class="form-label">Region Name <span class="req">*</span></label>
                        <input name="regionName" class="form-control" maxlength="25" required/>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-ghost" onclick="closeModal('modal-edit-region')">Cancel</button>
                        <button type="submit" class="btn-primary">✔ Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <!-- ══ MODAL: Delete Region ══ -->
    <div id="modal-delete-region" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-header">
                <h4>Delete Region</h4>
                <button class="modal-close" onclick="closeModal('modal-delete-region')">✕</button>
            </div>
            <div class="modal-body">
                <p style="color:var(--ink2);margin-bottom:8px">
                    Delete region <strong class="delete-label"></strong>?
                </p>
                <p style="color:var(--amber);font-size:13px;font-weight:500" id="delete-region-warn">
                    ⚠ This will fail if countries are linked to this region.
                </p>
                <form method="post" style="margin-top:20px">
                    <div style="display:flex;justify-content:flex-end;gap:10px">
                        <button type="button" class="btn-ghost" onclick="closeModal('modal-delete-region')">Cancel</button>
                        <button type="submit" class="btn-danger">🗑 Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', function() {

            // Wire edit form: set action and populate regionName
            document.querySelectorAll('[data-edit-btn="modal-edit-region"]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var id   = this.dataset.regionid;
                    var name = this.dataset.regionname;
                    var form = document.getElementById('edit-region-form');
                    form.action = '/regions/' + id + '/edit';
                    form.querySelector('[name="regionName"]').value = name;
                });
            });

            // Init filter + pagination
            initFilterTable('reg-tbody', null, 10);
        });
    </script>

</th:block>
</body>
</html>
