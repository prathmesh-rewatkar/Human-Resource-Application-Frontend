<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Portal — Our Team</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:#0f0e0d; --cream:#f5f0e8; --gold:#c9a84c;
            --gold-light:#e8d5a0; --rust:#c4522a; --card-bg:#ffffff;
            --shadow:0 8px 40px rgba(15,14,13,0.12);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:var(--cream);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
        body::before{content:'';position:fixed;top:-50%;right:-20%;width:600px;height:600px;
            background:radial-gradient(circle,rgba(201,168,76,.12) 0%,transparent 70%);
            pointer-events:none;z-index:0}
        .header{padding:3rem 4rem 2rem;position:relative;z-index:1;
            opacity:0;animation:fadeUp .6s ease .05s forwards}
        .header-line{width:60px;height:3px;background:var(--gold);margin-bottom:1rem}
        .header h1{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,5vw,4rem);
            font-weight:900;color:var(--ink);letter-spacing:-1px;line-height:1.1}
        .header h1 span{color:var(--gold)}
        .header p{margin-top:.75rem;color:#6b6560;font-size:1rem;font-weight:300;letter-spacing:.5px}
        .nav-hint{position:absolute;top:3rem;right:4rem;font-size:.75rem;color:#9b9490;
            letter-spacing:2px;text-transform:uppercase}
        .team-section{padding:2rem 4rem 5rem;position:relative;z-index:1}
        .section-label{font-size:.7rem;letter-spacing:4px;text-transform:uppercase;
            color:var(--rust);font-weight:500;margin-bottom:2.5rem}
        .team-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1.5rem}

        /* ── Card ── */
        .member-card{background:var(--card-bg);border-radius:4px;overflow:hidden;cursor:pointer;
            transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .35s ease;
            text-decoration:none;display:block;position:relative;
            opacity:0;animation:fadeUp .5s ease forwards}
        .member-card:nth-child(1){animation-delay:.1s}
        .member-card:nth-child(2){animation-delay:.2s}
        .member-card:nth-child(3){animation-delay:.3s}
        .member-card:nth-child(4){animation-delay:.4s}
        .member-card:nth-child(5){animation-delay:.5s}
        .member-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
            background:var(--gold);transform:scaleX(0);transition:transform .3s ease;transform-origin:left}
        .member-card:hover{transform:translateY(-10px);box-shadow:var(--shadow)}
        .member-card:hover::after{transform:scaleX(1)}

        /* ── Card image area (square background) ── */
        .card-image{width:100%;aspect-ratio:1;
            background:linear-gradient(135deg,#e8e0d4 0%,#d4c9b8 100%);
            display:flex;align-items:center;justify-content:center;
            position:relative;overflow:hidden}

        /* ── Round photo ── */
        .member-photo{
            width:72%;
            height:72%;
            object-fit:cover;
            object-position:center top;
            border-radius:50%;
            border:3px solid var(--gold);
            transition:transform .35s cubic-bezier(.34,1.56,.64,1);
        }
        .member-card:hover .member-photo{
            transform:scale(1.06);
        }

        /* ── Fallback avatar (shown when no photo) ── */
        .avatar-placeholder{width:72%;height:72%;border-radius:50%;
            background:var(--gold-light);display:flex;align-items:center;justify-content:center;
            font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;
            color:var(--ink);border:3px solid var(--gold)}

        .card-hover-overlay{position:absolute;inset:0;background:rgba(201,168,76,.15);
            opacity:0;transition:opacity .3s ease;display:flex;align-items:center;justify-content:center}
        .member-card:hover .card-hover-overlay{opacity:1}
        .view-btn{background:var(--gold);color:var(--ink);padding:.5rem 1.2rem;border-radius:2px;
            font-size:.75rem;font-weight:500;letter-spacing:1px;text-transform:uppercase}
        .card-number{position:absolute;top:.75rem;left:.75rem;font-size:.65rem;font-weight:500;
            color:rgba(255,255,255,.8);letter-spacing:1px;background:rgba(15,14,13,.3);
            padding:.2rem .5rem;border-radius:2px}
        .card-info{padding:1.2rem 1.2rem 1.4rem}
        .card-info h3{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;
            color:var(--ink);margin-bottom:.25rem}
        .card-info p{font-size:.75rem;color:#9b9490;font-weight:300;letter-spacing:.5px}
        .bottom-strip{position:fixed;bottom:0;left:0;right:0;background:var(--ink);color:var(--cream);
            padding:1rem 4rem;display:flex;justify-content:space-between;align-items:center;z-index:10}
        .bottom-strip span{font-size:.75rem;letter-spacing:2px;text-transform:uppercase;opacity:.6}
        .bottom-strip a{color:var(--gold);text-decoration:none;font-size:.75rem;letter-spacing:1px}
        @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        @media(max-width:900px){.team-grid{grid-template-columns:repeat(3,1fr)}
            .header,.team-section{padding-left:2rem;padding-right:2rem}}
        @media(max-width:600px){.team-grid{grid-template-columns:repeat(2,1fr)}}
    </style>
</head>
<body>
<div class="header">
    <div class="nav-hint">Human Resource Portal</div>
    <div class="header-line"></div>
    <h1>Meet the <span>Team</span></h1>
    <p>Click on a team member to explore their data</p>
</div>

<div class="team-section">
    <div class="section-label">— Our Members</div>
    <div class="team-grid">

        <a class="member-card" href="/departments">
            <div class="card-image">
                <img src="/images/swarali.jpeg" alt="Swarali" class="member-photo"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="avatar-placeholder" style="display:none">S</div>
                <span class="card-number">01</span>
                <div class="card-hover-overlay"><span class="view-btn">View Work</span></div>
            </div>
            <div class="card-info"><h3>Swarali</h3><p>Departments</p></div>
        </a>

        <a class="member-card" href="/managers?page=0">
            <div class="card-image">
                <img src="/images/samidha.jpeg" alt="Samiddha" class="member-photo"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="avatar-placeholder" style="display:none">S</div>
                <span class="card-number">02</span>
                <div class="card-hover-overlay"><span class="view-btn">View Work</span></div>
            </div>
            <div class="card-info"><h3>Samiddha</h3><p>Managers</p></div>
        </a>

        <a class="member-card" th:href="@{/locations}">
            <div class="card-image">
                <img src="/images/netal.jpeg" alt="Netal" class="member-photo"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="avatar-placeholder" style="display:none">N</div>
                <span class="card-number">03</span>
                <div class="card-hover-overlay"><span class="view-btn">View Work</span></div>
            </div>
            <div class="card-info"><h3>Netal</h3><p>Locations</p></div>
        </a>

        <a class="member-card" href="/jobs-page">
            <div class="card-image">
                <img src="/images/nidhi.jpeg" alt="Nidhi" class="member-photo"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="avatar-placeholder" style="display:none">A</div>
                <span class="card-number">04</span>
                <div class="card-hover-overlay"><span class="view-btn">View Work</span></div>
            </div>
            <div class="card-info"><h3>Nidhi</h3><p>Jobs</p></div>
        </a>

        <a class="member-card" href="/employees">
            <div class="card-image">
                <img src="/images/prathmesh.jpeg" alt="Prathmesh" class="member-photo"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="avatar-placeholder" style="display:none">M</div>
                <span class="card-number">05</span>
                <div class="card-hover-overlay"><span class="view-btn">View Work</span></div>
            </div>
            <div class="card-info"><h3>Prathmesh</h3><p>Employees</p></div>
        </a>

    </div>
</div>
</body>
</html>
